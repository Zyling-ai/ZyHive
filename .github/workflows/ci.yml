name: CI

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  go:
    name: Go (test / vet / build)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'
          cache: true

      - name: go vet
        run: go vet ./...

      - name: go test
        run: go test ./... -count=1 -timeout=5m

      - name: go build
        run: go build ./...

  lint-go:
    name: golangci-lint (advisory)
    runs-on: ubuntu-latest
    # 首次接入：lint 只产生告警，不阻断 PR 合入；待存量清零后改为 required check。
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.22'
          cache: true
      - uses: golangci/golangci-lint-action@v6
        with:
          version: v1.64.5
          args: --timeout=5m

  ui:
    name: UI (build)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ui
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: ui/package-lock.json

      - name: Install deps
        run: npm ci

      - name: Build
        run: npm run build
