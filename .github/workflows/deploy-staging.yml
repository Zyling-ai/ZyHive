name: deploy-staging-aws

on:
  # Manual trigger from the Actions tab.
  workflow_dispatch:
    inputs:
      version:
        description: 'Override version string (default: short SHA)'
        required: false
        type: string
  # Auto-deploy when a tag matching v*-staging is pushed.
  push:
    tags:
      - 'v*-staging'

# Single-deploy-at-a-time guard. Cancelling an in-flight deploy is
# disabled — let it finish to avoid leaving the host in a half-swap state.
concurrency:
  group: aws-staging
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    permissions:
      contents: read
    env:
      AWS_REGION: ap-east-1
      AWS_INSTANCE_ID: i-04405815de67eda10
      AWS_HOST: 18.162.161.138
      AWS_SSH_USER: ubuntu

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25.10'

      - name: Set up Node (for vite build)
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install AWS CLI
        run: |
          if ! command -v aws >/dev/null 2>&1; then
              python3 -m pip install --quiet awscli
              echo "$HOME/.local/bin" >> "$GITHUB_PATH"
          fi
          aws --version

      - name: Compute version string
        id: ver
        run: |
          if [[ -n "${{ inputs.version }}" ]]; then
              echo "version=${{ inputs.version }}" >> "$GITHUB_OUTPUT"
          elif [[ "$GITHUB_REF" == refs/tags/* ]]; then
              echo "version=${GITHUB_REF#refs/tags/}" >> "$GITHUB_OUTPUT"
          else
              echo "version=$(git rev-parse --short HEAD)-staging" >> "$GITHUB_OUTPUT"
          fi

      - name: Run deploy script
        env:
          AWS_ACCESS_KEY_ID:     ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_REGION:            ${{ env.AWS_REGION }}
          AWS_INSTANCE_ID:       ${{ env.AWS_INSTANCE_ID }}
          AWS_HOST:              ${{ env.AWS_HOST }}
          AWS_SSH_USER:          ${{ env.AWS_SSH_USER }}
        run: |
          chmod +x scripts/deploy-aws.sh
          ./scripts/deploy-aws.sh "${{ steps.ver.outputs.version }}"

      - name: Smoke test
        env:
          ZYHIVE_TOKEN: ${{ secrets.ZYHIVE_STAGING_TOKEN }}
        run: |
          chmod +x scripts/test/smoke-aiteam.sh
          # Give systemd a moment more on hot-swap latency
          sleep 2
          ./scripts/test/smoke-aiteam.sh "http://${{ env.AWS_HOST }}:8080" "$ZYHIVE_TOKEN" "${{ steps.ver.outputs.version }}"

      - name: Summary
        if: always()
        run: |
          echo "### AWS staging deploy" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "* version: \`${{ steps.ver.outputs.version }}\`" >> "$GITHUB_STEP_SUMMARY"
          echo "* host:    http://${{ env.AWS_HOST }}:8080" >> "$GITHUB_STEP_SUMMARY"
          echo "* status:  ${{ job.status }}" >> "$GITHUB_STEP_SUMMARY"
